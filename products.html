<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products</title>

<style>
/* SAME THEME */
*{margin:0;padding:0;box-sizing:border-box;}

button{width:100%;padding:10px;background:#facc15;border:none;border-radius:8px;}

<header>

<nav>

<div class="container">

<div class="products">

<div class="card">
<h3>Laptop</h3>
<p class="price">R5500</p>

</div>

<div class="card">
<h3>Headphones</h3>
<p class="price">R350</p>

</div>

</html>
