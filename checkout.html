<script>
// ✅ Supabase connection
const SUPABASE_URL = "https://lyvtjcnzeihsqvpzkced.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dnRqY256ZWloc3F2cHprY2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjAxODAsImV4cCI6MjA5NjEzNjE4MH0.YcMI_AKjUczeecLQcNq6OyPcfxOe7Z21hvacVW6qTfM";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// ✅ LOAD CART
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const container = document.getElementById("cart-items");
    const totalDiv = document.getElementById("total");

    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = "<p class='empty'>Your cart is empty</p>";
        totalDiv.innerHTML = "";
        return;
    }

    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        container.innerHTML += `
            <div class="cart-item">
                <h3>${item.name}</h3>
                <p class="price">R${item.price}</p>
                <button onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    });

    totalDiv.innerHTML = `<p class="total">Total: R${total}</p>`;
}

// ✅ REMOVE ITEM
function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));

    loadCart();
}

// ✅ ✅ CHECKOUT (CONNECTED TO DATABASE)
async function checkout() {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Your cart is empty");
        return;
    }

    // ✅ Step 1: get logged-in user
    const { data: { user } } = await client.auth.getUser();

    if (!user) {
        alert("Please login first");
        return;
    }

    // ✅ Step 2: calculate total
    let total = cart.reduce((sum, item) => sum + item.price, 0);

    // ✅ Step 3: create order
    const { data: order, error: orderError } = await client
        .from('orders')
        .insert([{
            user_id: user.id,
            total: total,
            status: "pending"
        }])
        .select()
        .single();

    if (orderError) {
        console.error(orderError);
        alert("Error creating order");
        return;
    }

    // ✅ Step 4: insert order items
    const items = cart.map(item => ({
        order_id: order.id,
        product_id: item.id,
        name: item.name,
        price: item.price
    }));

    const { error: itemsError } = await client
        .from('order_items')
        .insert(items);

    if (itemsError) {
        console.error(itemsError);
        alert("Error saving items");
        return;
    }

    // ✅ Step 5: clear cart
    localStorage.removeItem("cart");

    alert("✅ Order placed successfully!");

    // ✅ reload UI
    loadCart();
}

loadCart();
</script>
