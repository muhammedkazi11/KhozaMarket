async function loadStats() {

    console.log("Loading dashboard stats...");

    try {

        // ✅ USERS
        const { count: usersCount, error: userError } = await client
            .from('profiles')
            .select('*', { count: 'exact', head: true });

        console.log("Users:", usersCount, userError);

        // ✅ ORDERS
        const { count: ordersCount, error: orderError } = await client
            .from('orders')
            .select('*', { count: 'exact', head: true });

        console.log("Orders:", ordersCount, orderError);

        // ✅ PRODUCTS
        const { count: productsCount, error: productError } = await client
            .from('products')
            .select('*', { count: 'exact', head: true });

        console.log("Products:", productsCount, productError);

        document.getElementById("userCount").innerText = usersCount ?? 0;
        document.getElementById("orderCount").innerText = ordersCount ?? 0;
        document.getElementById("productCount").innerText = productsCount ?? 0;

    } catch (err) {
        console.error("Dashboard error:", err);
