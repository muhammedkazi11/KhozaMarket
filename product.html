body {

.price {

}

button {
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    background: #facc15;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}
</style>

<body>

<div class="container">
    <div id="product">Loading...</div>
</div>

<script>
// ✅ Supabase
const SUPABASE_URL = "https://lyvtjcnzeihsqvpzkced.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dnRqY256ZWloc3F2cHprY2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjAxODAsImV4cCI6MjA5NjEzNjE4MH0.YcMI_AKjUczeecLQcNq6OyPcfxOe7Z21hvacVW6qTfM";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// ✅ LOAD PRODUCT
async function loadProduct() {

    const params = new URLSearchParams(window.location.search);
    let id = parseInt(params.get("id"));

    if (!id) {
        document.getElementById("product").innerHTML = "Invalid product ID";
        return;
    }

    const { data, error } = await client
        .from('products')
        .select('*')
        .eq('id', id);

    const container = document.getElementById("product");

    if (error || !data || data.length === 0) {
        container.innerHTML = "<p>❌ Product not found</p>";
        return;
    }

    const p = data[0];

    container.innerHTML = `
        <div class="card">
            <h1>${p.name}</h1>
            <p class="price">R${p.price}</p>
            <p class="desc">${p.description || "No description available"}</p>
            <p>Seller: ${p.seller_name}</p>

            <button onclick='addToCart(${p.id}, ${JSON.stringify(p.name)}, ${p.price})'>
                Add to Cart
            </button>

            <a href="index.html"><button>Back to Home</button></a>
        </div>
    `;
}

// ✅ ✅ FIXED ADD TO CART + REDIRECT TO CART PAGE
function addToCart(id, name, price) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const existingItem = cart.find(item => item.id === id);

    if (existingItem) {
        // ✅ Already exists → just go to cart
        window.location.href = "cart.html";
        return;
    }

    cart.push({ id, name, price });

    localStorage.setItem("cart", JSON.stringify(cart));

    console.log("UPDATED CART:", cart);

    // ✅ INSTANT REDIRECT TO CART
    window.location.href = "cart.html";
}

// ✅ BUY NOW (future)
function buyNow(id) {
    alert("🚀 Checkout coming next");
}

loadProduct();
</script>

</body>
</html>
