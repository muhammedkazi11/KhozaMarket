<!DOCTYPE html>
<html>
<head>

<title>User Management</title>

<style>
body{font-family:'Segoe UI';background:#0f172a;color:#fff;margin:0;}
header{background:#020617;padding:15px 40px;color:#facc15;}
.container{padding:40px;}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
}

.role{
    color:#facc15;
    font-size:14px;
}

button{
    padding:6px 10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#facc15;
    cursor:pointer;
}

.back-btn{
    margin-top:30px;
    background:#334155;
    color:white;
}
</style>

</head>
<body>

<header>
<h2>User Management</h2>
</header>

<div class="container">

<h1>All Users</h1>

<div id="users">Loading...</div>

<a href="admin.html">
<button class="back-btn">⬅ Back to Dashboard</button>
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ✅ Supabase
const SUPABASE_URL = "https://lyvtjcnzeihsqvpzkced.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dnRqY256ZWloc3F2cHprY2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjAxODAsImV4cCI6MjA5NjEzNjE4MH0.YcMI_AKjUczeecLQcNq6OyPcfxOe7Z21hvacVW6qTfM";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// ✅ LOAD USERS
async function loadUsers() {

    const { data, error } = await client
        .from('profiles')
        .select('*')
        .order('created_at', { ascending: false });

    console.log("USERS:", data);

    const container = document.getElementById("users");
    container.innerHTML = "";

    if (error) {
        container.innerHTML = "❌ Error loading users";
        return;
    }

    if (!data || data.length === 0) {
        container.innerHTML = "No users found";
        return;
    }

    data.forEach(user => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${user.full_name || "No Name"}</h3>
            <p>${user.email}</p>
            <p class="role">Role: ${user.role}</p>

            ${
                user.role === "admin"
                ? `<button onclick="changeRole('${user.id}', 'user')">Remove Admin</button>`
                : `<button onclick="changeRole('${user.id}', 'admin')">Make Admin</button>`
            }
        `;

        container.appendChild(div);
    });
}

// ✅ CHANGE ROLE
async function changeRole(userId, newRole) {

    const confirmChange = confirm(`Change role to ${newRole}?`);
    if (!confirmChange) return;

    const { error } = await client
        .from('profiles')
        .update({ role: newRole })
        .eq('id', userId);

    if (error) {
        console.error(error);
        alert("❌ Error updating role");
        return;
    }

    alert("✅ Role updated");

    loadUsers();
}

// ✅ INIT
loadUsers();

</script>

</body>
</html>
