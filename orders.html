<!DOCTYPE html>
<html>
<head>

<title>Order Monitoring</title>

<style>
body{font-family:'Segoe UI';background:#0f172a;color:#fff;margin:0;}

header{
    background:#020617;
    padding:15px 40px;
    color:#facc15;
}

.container{padding:40px;}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.status{
    margin-top:10px;
    font-size:14px;
}

.status.completed{ color:#22c55e; }
.status.pending{ color:#facc15; }

.items{
    margin-top:10px;
    padding-left:10px;
}

button{
    padding:6px 10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#facc15;
    cursor:pointer;
}

.back-btn{
    margin-top:30px;
    background:#334155;
    color:white;
    width:100%;
}
</style>

</head>
<body>

<header>
<h2>Order Monitoring</h2>
</header>

<div class="container">

<h1>All Orders</h1>

<div id="orders">Loading...</div>

<a href="admin.html">
<button class="back-btn">⬅ Back to Dashboard</button>
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ✅ Supabase
const SUPABASE_URL = "https://lyvtjcnzeihsqvpzkced.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dnRqY256ZWloc3F2cHprY2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjAxODAsImV4cCI6MjA5NjEzNjE4MH0.YcMI_AKjUczeecLQcNq6OyPcfxOe7Z21hvacVW6qTfM";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// ✅ LOAD ORDERS
async function loadOrders() {

    const { data: orders, error } = await client
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });

    console.log("ORDERS:", orders, error);

    const container = document.getElementById("orders");
    container.innerHTML = "";

    if (error) {
        console.error("ORDER ERROR:", error);
        container.innerHTML = "❌ " + error.message;
        return;
    }

    if (!orders || orders.length === 0) {
        container.innerHTML = "No orders found";
        return;
    }

    for (let order of orders) {

        let itemsHTML = "Loading items...";

        // ✅ Safe items fetch (won't break page)
        const { data: items, error: itemError } = await client
            .from('order_items')
            .select('*')
            .eq('order_id', order.id);

        console.log("ITEMS:", items, itemError);

        if (!itemError && items && items.length > 0) {
            itemsHTML = "";
            items.forEach(i => {
                itemsHTML += `<li>${i.name} - R${i.price}</li>`;
            });
        } else {
            itemsHTML = "<li>No items found</li>";
        }

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>Order #${order.id}</h3>
            <p>Total: R${order.total}</p>

            <p>Status: ${order.status}</p>

            <ul>
                ${itemsHTML}
            </ul>

            ${
                order.status === "pending"
                ? `<button onclick="completeOrder(${order.id})">Mark Completed</button>`
                : ""
            }
        `;

        container.appendChild(div);
    }
}

// ✅ MARK AS COMPLETED
async function completeOrder(id) {

    const confirmAction = confirm("Mark this order as completed?");
    if (!confirmAction) return;

    const { error } = await client
        .from('orders')
        .update({ status: "completed" })
        .eq('id', id);

    if (error) {
        console.error(error);
        alert("❌ Error updating order");
        return;
    }

    alert("✅ Order completed");

    loadOrders();
}

// ✅ INIT
loadOrders();

</script>

</body>
</html>
