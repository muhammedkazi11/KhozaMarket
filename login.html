<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: #facc15;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.note {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>

    <div class="note">
        <p><strong>Test Accounts:</strong></p>
        <p>Admin: sByrneAdmin@gmail.com / bestLecturer4eva!</p>
        <p>User: sByrne@gmail.com / bestLecturer4always!</p>
    </div>
</div>

<script>

// ✅ Supabase
const SUPABASE_URL = "https://lyvtjcnzeihsqvpzkced.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dnRqY256ZWloc3F2cHprY2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjAxODAsImV4cCI6MjA5NjEzNjE4MH0.YcMI_AKjUczeecLQcNq6OyPcfxOe7Z21hvacVW6qTfM";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// ✅ LOGIN FUNCTION
async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Enter email and password");
        return;
    }

    const { data, error } = await client
        .from('app_users')
        .select('*')
        .eq('email', email)
        .eq('password', password)
        .single();

    console.log("LOGIN RESULT:", data, error);

    if (error || !data) {
        document.getElementById("msg").innerText = "❌ Invalid login";
        return;
    }

    // ✅ Redirect based on role
    if (data.role === "admin") {
        window.location.href = "admin.html";
    } else {
        window.location.href = "index.html";
    }
}

</script>

</body>
</html>
