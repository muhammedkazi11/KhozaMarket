<!DOCTYPE html>
<html>
<head>

<title>Product Management</title>

<style>
body{font-family:'Segoe UI';background:#0f172a;color:#fff;margin:0;}

header{
    background:#020617;
    padding:15px 40px;
    color:#facc15;
}

.container{padding:40px;}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
}

.status{
    font-size:14px;
    margin-bottom:10px;
}

.status.approved{ color:#22c55e; }
.status.pending{ color:#facc15; }

button{
    padding:6px 10px;
    margin-right:10px;
    border:none;
    border-radius:6px;
    background:#facc15;
    cursor:pointer;
}

.delete-btn{
    background:#ef4444;
    color:white;
}

.back-btn{
    margin-top:30px;
    background:#334155;
    color:white;
    width:100%;
}
</style>

</head>
<body>

<header>
<h2>Product Management</h2>
</header>

<div class="container">

<h1>All Products</h1>

<div id="products">Loading...</div>

<a href="admin.html">
<button class="back-btn">⬅ Back to Dashboard</button>
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ✅ Supabase
const SUPABASE_URL = "https://lyvtjcnzeihsqvpzkced.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5dnRqY256ZWloc3F2cHprY2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjAxODAsImV4cCI6MjA5NjEzNjE4MH0.YcMI_AKjUczeecLQcNq6OyPcfxOe7Z21hvacVW6qTfM";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// ✅ LOAD PRODUCTS
async function loadProducts() {

    const { data, error } = await client
        .from('products')
        .select('*')
        .order('created_at', { ascending: false });

    console.log("PRODUCTS:", data);

    const container = document.getElementById("products");
    container.innerHTML = "";

    if (error) {
        container.innerHTML = "❌ Error loading products";
        return;
    }

    if (!data || data.length === 0) {
        container.innerHTML = "No products found";
        return;
    }

    data.forEach(p => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${p.name}</h3>
            <p>R${p.price}</p>
            <p>${p.description || ""}</p>

            <p class="status ${p.status}">
                Status: ${p.status}
            </p>

            ${
                p.status === "pending"
                ? `<button onclick="approveProduct(${p.id})">Approve</button>`
                : ""
            }

            <button class="delete-btn" onclick="deleteProduct(${p.id})">
                Delete
            </button>
        `;

        container.appendChild(div);
    });
}

// ✅ APPROVE PRODUCT
async function approveProduct(id) {

    const confirmAction = confirm("Approve this product?");
    if (!confirmAction) return;

    const { error } = await client
        .from('products')
        .update({ status: "approved" })
        .eq('id', id);

    if (error) {
        console.error(error);
        alert("❌ Error approving product");
        return;
    }

    alert("✅ Product approved");

    loadProducts();
}

// ✅ DELETE PRODUCT
async function deleteProduct(id) {

    const confirmAction = confirm("Delete this product?");
    if (!confirmAction) return;

    const { error } = await client
        .from('products')
        .delete()
        .eq('id', id);

    if (error) {
        console.error(error);
        alert("❌ Error deleting product");
        return;
    }

    alert("✅ Product deleted");

    loadProducts();
}

// ✅ INIT
loadProducts();

</script>

</body>
</html>
